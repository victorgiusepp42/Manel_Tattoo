# MVP_0 — https://victorgiusepp42.github.io/Manel_Tattoo/
name: MVP_0 Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mvp0-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: MVP_0 publicar site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build
        run: npm ci && npm run build:pages

      - name: Publicar em main/docs
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: main
          publish_dir: ./dist
          destination_dir: docs
          keep_files: true
          commit_message: "MVP_0: atualiza docs/ para GitHub Pages"

      - name: Publicar em gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          commit_message: "MVP_0: atualiza gh-pages"
