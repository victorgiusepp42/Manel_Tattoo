# MVP_2 — https://victorgiusepp42.github.io/Manel_Tattoo/
name: MVP_2 Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mvp2-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: MVP_2 publicar site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build
        run: npm ci && npm run build:pages

      - name: Publicar na branch gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          commit_message: "MVP_2: deploy ${{ github.sha }}"
