# MVP_0 — publica em https://victorgiusepp42.github.io/Manel_Tattoo/
name: MVP_0 Deploy GitHub Pages

on:
  push:
    branches: [main]
    tags: ["MVP_*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mvp0-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: MVP_0 build and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build for GitHub Pages
        run: npm ci && npm run build:pages

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          commit_message: "MVP_0 deploy ${{ github.sha }}"
